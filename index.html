<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年4月 考勤日历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .balance-card {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .balance-row:last-child {
            margin-bottom: 0;
        }

        .balance-label {
            font-size: 1rem;
            color: #666;
        }

        .balance-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .balance-value.positive {
            color: #10b981;
        }

        .balance-value.negative {
            color: #ef4444;
        }

        .settings-card {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .settings-title {
            font-size: 1rem;
            color: #666;
            margin-bottom: 15px;
        }

        .settings-row {
            display: flex;
            gap: 30px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-item label {
            font-size: 0.9rem;
            color: #444;
        }

        .setting-item input {
            width: 80px;
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
        }

        .setting-item input:focus {
            outline: none;
            border-color: #667eea;
        }

        .calendar-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .calendar-header div {
            text-align: center;
            font-weight: 600;
            color: #888;
            font-size: 0.85rem;
            padding: 10px 0;
        }

        .calendar-header .weekend {
            color: #ef4444;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-cell {
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            border: 2px solid transparent;
            background: #f9fafb;
        }

        .day-cell:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .day-cell.empty {
            background: transparent;
            cursor: default;
        }

        .day-cell.empty:hover {
            transform: none;
        }

        .day-cell .date {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        .day-cell.weekend .date {
            color: #ef4444;
        }

        .day-cell.overtime {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: #047857;
        }

        .day-cell.overtime .date,
        .day-cell.overtime .status {
            color: white;
        }

        .day-cell.rest {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border-color: #b45309;
        }

        .day-cell.rest .date,
        .day-cell.rest .status {
            color: white;
        }

        .day-cell .status {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #888;
        }

        .day-cell .edit-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .day-cell:hover .edit-btn {
            opacity: 1;
        }

        .day-cell.overtime .edit-btn,
        .day-cell.rest .edit-btn {
            background: rgba(255,255,255,0.4);
        }

        /* 日历格子天气信息 */
        .day-cell .weather-mini {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 0.65rem;
            opacity: 0.8;
            pointer-events: none;
        }

        .day-cell .weather-mini .mini-icon {
            font-size: 1rem;
        }

        .day-cell .weather-mini .mini-temp {
            color: #555;
            font-weight: 500;
        }

        .day-cell.overtime .weather-mini,
        .day-cell.rest .weather-mini {
            color: rgba(255,255,255,0.9);
        }

        .day-cell.overtime .weather-mini .mini-temp,
        .day-cell.rest .weather-mini .mini-temp {
            color: rgba(255,255,255,0.95);
        }

        /* 悬浮天气提示框 */
        .day-cell .weather-tooltip {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: white;
            border-radius: 12px;
            padding: 12px 15px;
            min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            transform-origin: bottom center;
        }

        .day-cell:hover .weather-tooltip {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* 第一列的提示框靠右显示 */
        .day-cell:nth-child(7n+1) .weather-tooltip {
            left: 0;
            transform: translateX(0) scale(0.8);
            transform-origin: bottom left;
        }

        .day-cell:nth-child(7n+1):hover .weather-tooltip {
            transform: translateX(0) scale(1);
        }

        /* 最后一列的提示框靠左显示 */
        .day-cell:nth-child(7n) .weather-tooltip {
            left: auto;
            right: 0;
            transform: translateX(0) scale(0.8);
            transform-origin: bottom right;
        }

        .day-cell:nth-child(7n):hover .weather-tooltip {
            transform: translateX(0) scale(1);
        }

        /* 底部日期格子的提示框向上显示 */
        .day-cell:nth-last-child(-n+7) .weather-tooltip {
            bottom: auto;
            top: calc(100% + 10px);
            transform-origin: top center;
        }

        .day-cell:nth-last-child(-n+7):hover .weather-tooltip {
            transform: translateX(-50%) scale(1);
        }

        .day-cell:nth-child(7n+1):nth-last-child(-n+7) .weather-tooltip,
        .day-cell:nth-child(7n):nth-last-child(-n+7) .weather-tooltip {
            transform-origin: top left;
        }

        .weather-tooltip-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .weather-tooltip-icon {
            font-size: 2rem;
        }

        .weather-tooltip-temp {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .weather-tooltip-desc {
            font-size: 0.85rem;
            color: #666;
        }

        .weather-tooltip-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid #e5e7eb;
        }

        .weather-tooltip-detail {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
        }

        .weather-tooltip-detail-icon {
            font-size: 0.9rem;
        }

        .weather-tooltip-detail-value {
            color: #444;
            font-weight: 500;
        }

        .weather-tooltip-loading {
            text-align: center;
            color: #888;
            font-size: 0.8rem;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 6px;
        }

        .legend-color.overtime {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .legend-color.rest {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .legend-color.normal {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }

        .click-hint {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #888;
        }

        .stats-card {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-top: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .stats-title {
            font-size: 1rem;
            color: #666;
            margin-bottom: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 320px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-type {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .type-btn:hover {
            border-color: #667eea;
        }

        .type-btn.active.overtime-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border-color: #047857;
        }

        .type-btn.active.rest-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border-color: #b45309;
        }

        .type-btn.active.normal-btn {
            background: #f9fafb;
            border-color: #333;
        }

        .modal-hours {
            margin-bottom: 20px;
        }

        .modal-hours label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }

        .modal-hours input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
        }

        .modal-hours input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-hours .default-hint {
            font-size: 0.75rem;
            color: #999;
            margin-top: 6px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            border: none;
            transition: all 0.2s;
        }

        .modal-btn.cancel {
            background: #e5e7eb;
            color: #666;
        }

        .modal-btn.cancel:hover {
            background: #d1d5db;
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn.confirm:hover {
            transform: scale(1.02);
        }

        /* 今日特殊标注 */
        .day-cell.today {
            border: 3px solid #ec4899;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
            animation: today-glow 1.5s ease-in-out infinite;
        }

        @keyframes today-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
            50% { box-shadow: 0 0 25px rgba(236, 72, 153, 0.8); }
        }

        .day-cell .today-badge {
            position: absolute;
            bottom: -8px;
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .day-cell.overtime .today-badge,
        .day-cell.rest .today-badge {
            background: rgba(255,255,255,0.9);
            color: #ec4899;
        }

        /* 天气卡片样式 */
        .weather-card {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .weather-title {
            font-size: 1rem;
            color: #666;
        }

        .weather-location {
            font-size: 0.85rem;
            color: #888;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 3rem;
        }

        .weather-temp {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
        }

        .weather-desc {
            font-size: 1rem;
            color: #666;
            margin-left: 10px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .weather-detail {
            text-align: center;
        }

        .weather-detail-icon {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .weather-detail-value {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
        }

        .weather-detail-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 3px;
        }

        .weather-loading {
            text-align: center;
            color: #888;
            padding: 20px;
        }

        .weather-error {
            text-align: center;
            color: #ef4444;
            font-size: 0.9rem;
        }

        .city-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .city-input input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .city-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .city-input button {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .city-input button:hover {
            transform: scale(1.02);
        }

        /* 天气滑动时间轴 */
        .weather-timeline-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .weather-timeline-title {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weather-timeline-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .weather-timeline-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .weather-timeline-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .weather-timeline-scroll::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        .weather-timeline-scroll::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        .timeline-day {
            flex-shrink: 0;
            text-align: center;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 70px;
            background: #f9fafb;
            border: 2px solid transparent;
        }

        .timeline-day:hover {
            background: #f0f0f0;
        }

        .timeline-day.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .timeline-day.active .timeline-date,
        .timeline-day.active .timeline-temp {
            color: white;
        }

        .timeline-day.past {
            opacity: 0.7;
        }

        .timeline-day.today {
            border-color: #ec4899;
        }

        .timeline-day.today.active {
            border-color: #ec4899;
        }

        .timeline-date {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
        }

        .timeline-icon {
            font-size: 1.5rem;
            margin: 5px 0;
        }

        .timeline-temp {
            font-size: 0.8rem;
            color: #444;
        }

        .timeline-temp-high {
            color: #ef4444;
            font-weight: 600;
        }

        .timeline-temp-low {
            color: #3b82f6;
        }

        /* 选中日期的详细天气 */
        .selected-day-weather {
            margin-top: 20px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 12px;
        }

        .selected-day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .selected-day-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
        }

        .selected-day-date {
            font-size: 0.85rem;
            color: #888;
        }

        .selected-day-content {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .selected-day-main {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .selected-day-icon {
            font-size: 3rem;
        }

        .selected-day-temp {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }

        .selected-day-desc {
            font-size: 1rem;
            color: #666;
        }

        .selected-day-details {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .selected-day-detail {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }

        .selected-day-detail-icon {
            font-size: 1rem;
        }

        .selected-day-detail-value {
            color: #444;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 2026年4月 考勤日历</h1>
            <p>点击日期切换状态 · 点击✏️自定义时长</p>
        </div>

        <!-- 天气卡片 -->
        <div class="weather-card">
            <div class="weather-header">
                <span class="weather-title">🌡️ 天气</span>
                <span class="weather-location" id="weatherLocation">正在获取...</span>
            </div>
            <div class="city-input">
                <input type="text" id="cityInput" placeholder="输入城市名称（如：合肥）" value="合肥" onkeypress="if(event.key==='Enter')fetchWeather()">
                <button onclick="fetchWeather()">查询天气</button>
            </div>
            <div id="weatherContent">
                <div class="weather-loading">正在加载天气数据...</div>
            </div>
        </div>

        <div class="balance-card">
            <div class="balance-row">
                <span class="balance-label">当前休息时长余额</span>
                <span class="balance-value positive" id="balance">61.2 小时</span>
            </div>
        </div>

        <div class="settings-card">
            <div class="settings-title">⚙️ 默认时长设置</div>
            <div class="settings-row">
                <div class="setting-item">
                    <label>加班获得:</label>
                    <input type="number" id="defaultOvertime" value="1.5" step="0.5" min="0"> 小时
                </div>
                <div class="setting-item">
                    <label>休息花费:</label>
                    <input type="number" id="defaultRest" value="8" step="0.5" min="0"> 小时
                </div>
            </div>
        </div>

        <div class="calendar-card">
            <div class="calendar-header">
                <div class="weekend">日</div>
                <div>一</div>
                <div>二</div>
                <div>三</div>
                <div>四</div>
                <div>五</div>
                <div class="weekend">六</div>
            </div>
            <div class="calendar-grid" id="calendar">
                <!-- 日历格子将由JS生成 -->
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color normal"></div>
                    <span>普通</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color overtime"></div>
                    <span>加班</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color rest"></div>
                    <span>休息</span>
                </div>
            </div>
            <p class="click-hint">💡 点击日期切换状态 · 悬停出现✏️可自定义时长</p>
        </div>

        <div class="stats-card">
            <div class="stats-title">📊 本月统计</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="overtimeCount">0</div>
                    <div class="stat-label">加班天数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="restCount">0</div>
                    <div class="stat-label">休息天数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="monthChange">+0</div>
                    <div class="stat-label">本月变动(小时)</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">编辑 4月1日</div>

            <div class="modal-type">
                <button class="type-btn normal-btn" data-type="0">普通</button>
                <button class="type-btn overtime-btn" data-type="1">加班</button>
                <button class="type-btn rest-btn" data-type="2">休息</button>
            </div>

            <div class="modal-hours" id="hoursSection" style="display: none;">
                <label id="hoursLabel">加班时长</label>
                <input type="number" id="customHours" step="0.5" min="0" value="1.5">
                <p class="default-hint" id="defaultHint">默认值: 1.5 小时</p>
            </div>

            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveDaySettings()">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 初始余额
        const INITIAL_BALANCE = 61.2;

        // 日历数据结构: { day: { type: 0/1/2, hours: null/number } }
        // type: 0=普通, 1=加班, 2=休息
        // hours: null表示使用默认值，number表示自定义值
        const dayData = {};

        // 2026年4月: 1日是周三
        const firstDayOfWeek = 3;
        const daysInMonth = 30;

        // 获取今天是几号（动态）
        let todayDay = 7; // 默认值

        // 尝试获取真实日期
        function getToday() {
            const now = new Date();
            if (now.getFullYear() === 2026 && now.getMonth() === 3) { // 月份从0开始，3=4月
                return now.getDate();
            }
            return 7; // 如果不在2026年4月，显示7号作为示例
        }

        // 初始化今天
        todayDay = getToday();

        // 当前编辑的日期
        let editingDay = null;

        // 存储每日天气数据
        let dailyWeatherData = {};

        // 获取默认值
        function getDefaultOvertime() {
            return parseFloat(document.getElementById('defaultOvertime').value) || 1.5;
        }

        function getDefaultRest() {
            return parseFloat(document.getElementById('defaultRest').value) || 8;
        }

        // 获取某天的天气信息
        function getDayWeather(day) {
            const defaultWeather = {
                hasData: false,
                icon: '🌤️',
                tempRange: '--',
                maxTemp: '--',
                minTemp: '--',
                desc: '--',
                humidity: '--',
                precip: '--',
                uv: '--',
                windSpeed: '--'
            };

            if (!dailyWeatherData[day]) {
                return defaultWeather;
            }

            const data = dailyWeatherData[day];
            return {
                hasData: true,
                icon: data.icon,
                tempRange: `${data.minTemp}°/${data.maxTemp}°`,
                maxTemp: data.maxTemp,
                minTemp: data.minTemp,
                desc: data.desc,
                humidity: data.humidity,
                precip: data.precip,
                uv: data.uv,
                windSpeed: data.windSpeed
            };
        }

        // 获取某天的实际时长
        function getDayHours(day) {
            const data = dayData[day];
            if (!data || data.type === 0) return 0;

            if (data.hours !== null && data.hours !== undefined) {
                return data.hours;
            }

            // 使用默认值
            return data.type === 1 ? getDefaultOvertime() : getDefaultRest();
        }

        // 计算余额
        function calculateBalance() {
            let balance = INITIAL_BALANCE;
            let overtimeDays = 0;
            let restDays = 0;
            let monthChange = 0;

            for (let day in dayData) {
                const data = dayData[day];
                if (data.type === 1) { // 加班
                    const hours = getDayHours(parseInt(day));
                    balance += hours;
                    monthChange += hours;
                    overtimeDays++;
                } else if (data.type === 2) { // 休息
                    const hours = getDayHours(parseInt(day));
                    balance -= hours;
                    monthChange -= hours;
                    restDays++;
                }
            }

            return { balance, overtimeDays, restDays, monthChange };
        }

        // 更新显示
        function updateDisplay() {
            const { balance, overtimeDays, restDays, monthChange } = calculateBalance();

            const balanceEl = document.getElementById('balance');
            balanceEl.textContent = balance.toFixed(1) + ' 小时';
            balanceEl.className = 'balance-value ' + (balance >= 0 ? 'positive' : 'negative');

            document.getElementById('overtimeCount').textContent = overtimeDays;
            document.getElementById('restCount').textContent = restDays;

            const monthChangeEl = document.getElementById('monthChange');
            monthChangeEl.textContent = (monthChange >= 0 ? '+' : '') + monthChange.toFixed(1);
            monthChangeEl.style.color = monthChange >= 0 ? '#10b981' : '#ef4444';

            // 更新所有日期显示
            for (let day in dayData) {
                updateCellDisplay(parseInt(day));
            }

            saveData();
        }

        // 更新单元格显示
        function updateCellDisplay(day) {
            const cell = document.querySelector(`[data-day="${day}"]`);
            if (!cell) return;

            const data = dayData[day];
            const type = data ? data.type : 0;

            // 先移除状态相关的类，保留其他类
            cell.classList.remove('overtime', 'rest');

            // 获取或创建status元素
            let statusEl = cell.querySelector('.status');
            if (!statusEl) {
                statusEl = document.createElement('span');
                statusEl.className = 'status';
                const dateEl = cell.querySelector('.date');
                if (dateEl && dateEl.nextSibling) {
                    cell.insertBefore(statusEl, dateEl.nextSibling);
                } else {
                    cell.appendChild(statusEl);
                }
            }
            statusEl.textContent = '';

            // 移除旧的today-badge
            const oldBadge = cell.querySelector('.today-badge');
            if (oldBadge) oldBadge.remove();

            // 今日标注
            if (day === todayDay) {
                cell.classList.add('today');
                const badge = document.createElement('span');
                badge.className = 'today-badge';
                badge.textContent = '今天';
                cell.appendChild(badge);
            }

            // 添加状态类和显示文本
            if (type === 1) {
                cell.classList.add('overtime');
                const hours = getDayHours(day);
                const isCustom = data && data.hours !== null && data.hours !== undefined;
                statusEl.textContent = '+' + hours + 'h' + (isCustom ? '*' : '');
            } else if (type === 2) {
                cell.classList.add('rest');
                const hours = getDayHours(day);
                const isCustom = data && data.hours !== null && data.hours !== undefined;
                statusEl.textContent = '-' + hours + 'h' + (isCustom ? '*' : '');
            }
        }

        // 切换日期状态（点击日期）
        function toggleDay(day) {
            console.log('=== toggleDay start ===');
            console.log('day:', day);

            const currentType = dayData[day] ? dayData[day].type : 0;
            const newType = (currentType + 1) % 3;

            if (newType === 0) {
                delete dayData[day];
            } else {
                dayData[day] = { type: newType, hours: null };
            }

            // 使用更具体的选择器，只找日历格子（#calendar 内的）
            const cell = document.querySelector(`#calendar [data-day="${day}"]`);
            console.log('cell found:', !!cell);

            if (cell) {
                console.log('cell className before:', cell.className);

                const dayState = dayData[day];
                const type = dayState ? dayState.type : 0;

                // 更新类名
                cell.classList.remove('overtime', 'rest');
                if (type === 1) {
                    cell.classList.add('overtime');
                }
                if (type === 2) {
                    cell.classList.add('rest');
                }

                console.log('cell className after:', cell.className);

                // 更新状态文本
                const statusEl = cell.querySelector('.status');
                if (statusEl) {
                    if (type === 1) {
                        const hours = dayState && dayState.hours !== null ? dayState.hours : getDefaultOvertime();
                        const isCustom = dayState && dayState.hours !== null && dayState.hours !== undefined;
                        statusEl.textContent = '+' + hours + 'h' + (isCustom ? '*' : '');
                    } else if (type === 2) {
                        const hours = dayState && dayState.hours !== null ? dayState.hours : getDefaultRest();
                        const isCustom = dayState && dayState.hours !== null && dayState.hours !== undefined;
                        statusEl.textContent = '-' + hours + 'h' + (isCustom ? '*' : '');
                    } else {
                        statusEl.textContent = '';
                    }
                }
            }

            updateDisplay();
            console.log('=== toggleDay end ===');
        }

        // 打开编辑弹窗
        function openEditModal(day) {
            editingDay = day;
            const data = dayData[day] || { type: 0, hours: null };

            document.getElementById('modalTitle').textContent = `编辑 4月${day}日`;

            // 设置类型按钮
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.type) === data.type) {
                    btn.classList.add('active');
                }
            });

            // 显示/隐藏时长输入
            const hoursSection = document.getElementById('hoursSection');
            const hoursLabel = document.getElementById('hoursLabel');
            const customHoursInput = document.getElementById('customHours');
            const defaultHint = document.getElementById('defaultHint');

            if (data.type === 1) {
                hoursSection.style.display = 'block';
                hoursLabel.textContent = '加班获得时长';
                customHoursInput.value = data.hours !== null ? data.hours : getDefaultOvertime();
                defaultHint.textContent = `默认值: ${getDefaultOvertime()} 小时`;
            } else if (data.type === 2) {
                hoursSection.style.display = 'block';
                hoursLabel.textContent = '休息花费时长';
                customHoursInput.value = data.hours !== null ? data.hours : getDefaultRest();
                defaultHint.textContent = `默认值: ${getDefaultRest()} 小时`;
            } else {
                hoursSection.style.display = 'none';
            }

            document.getElementById('modal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editingDay = null;
        }

        // 保存设置
        function saveDaySettings() {
            if (!editingDay) return;

            const activeTypeBtn = document.querySelector('.type-btn.active');
            const type = parseInt(activeTypeBtn.dataset.type);

            if (type === 0) {
                delete dayData[editingDay];
            } else {
                const hoursInput = document.getElementById('customHours');
                const customHours = parseFloat(hoursInput.value);
                const defaultHours = type === 1 ? getDefaultOvertime() : getDefaultRest();

                // 如果输入值等于默认值，则存为null（使用默认）
                dayData[editingDay] = {
                    type: type,
                    hours: customHours === defaultHours ? null : customHours
                };
            }

            updateCellDisplay(editingDay);
            updateDisplay();
            closeModal();
        }

        // 类型按钮点击
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const type = parseInt(this.dataset.type);
                const hoursSection = document.getElementById('hoursSection');
                const hoursLabel = document.getElementById('hoursLabel');
                const customHoursInput = document.getElementById('customHours');
                const defaultHint = document.getElementById('defaultHint');

                if (type === 1) {
                    hoursSection.style.display = 'block';
                    hoursLabel.textContent = '加班获得时长';
                    customHoursInput.value = getDefaultOvertime();
                    defaultHint.textContent = `默认值: ${getDefaultOvertime()} 小时`;
                } else if (type === 2) {
                    hoursSection.style.display = 'block';
                    hoursLabel.textContent = '休息花费时长';
                    customHoursInput.value = getDefaultRest();
                    defaultHint.textContent = `默认值: ${getDefaultRest()} 小时`;
                } else {
                    hoursSection.style.display = 'none';
                }
            });
        });

        // 生成日历
        function generateCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            // 1日前的空格
            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                calendar.appendChild(emptyCell);
            }

            // 生成日期
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                cell.setAttribute('data-day', day);

                // 获取该天的天气数据
                const weatherInfo = getDayWeather(day);

                // 获取该天的考勤状态
                const dayState = dayData[day];
                const type = dayState ? dayState.type : 0;

                // 设置初始类名
                let classNames = 'day-cell';
                if (type === 1) classNames += ' overtime';
                if (type === 2) classNames += ' rest';
                if (day === todayDay) classNames += ' today';
                const dayOfWeek = (firstDayOfWeek + day - 1) % 7;
                if (dayOfWeek === 0 || dayOfWeek === 6) classNames += ' weekend';
                cell.className = classNames;

                // 获取状态文本
                let statusText = '';
                if (type === 1) {
                    const hours = dayState && dayState.hours !== null ? dayState.hours : getDefaultOvertime();
                    const isCustom = dayState && dayState.hours !== null && dayState.hours !== undefined;
                    statusText = '+' + hours + 'h' + (isCustom ? '*' : '');
                } else if (type === 2) {
                    const hours = dayState && dayState.hours !== null ? dayState.hours : getDefaultRest();
                    const isCustom = dayState && dayState.hours !== null && dayState.hours !== undefined;
                    statusText = '-' + hours + 'h' + (isCustom ? '*' : '');
                }

                cell.innerHTML = `
                    <span class="date">${day}</span>
                    <span class="status">${statusText}</span>
                    <span class="edit-btn">✏️</span>
                    <span class="weather-mini">
                        <span class="mini-icon">${weatherInfo.icon}</span>
                        <span class="mini-temp">${weatherInfo.tempRange}</span>
                    </span>
                    <div class="weather-tooltip">
                        ${weatherInfo.hasData ? `
                            <div class="weather-tooltip-header">
                                <span class="weather-tooltip-icon">${weatherInfo.icon}</span>
                                <span class="weather-tooltip-temp">${weatherInfo.maxTemp}°</span>
                                <span class="weather-tooltip-desc">${weatherInfo.desc}</span>
                            </div>
                            <div class="weather-tooltip-details">
                                <div class="weather-tooltip-detail">
                                    <span class="weather-tooltip-detail-icon">🌡️</span>
                                    <span class="weather-tooltip-detail-value">${weatherInfo.minTemp}° ~ ${weatherInfo.maxTemp}°</span>
                                </div>
                                <div class="weather-tooltip-detail">
                                    <span class="weather-tooltip-detail-icon">💧</span>
                                    <span class="weather-tooltip-detail-value">${weatherInfo.humidity}%</span>
                                </div>
                                <div class="weather-tooltip-detail">
                                    <span class="weather-tooltip-detail-icon">🌧️</span>
                                    <span class="weather-tooltip-detail-value">${weatherInfo.precip}mm</span>
                                </div>
                                <div class="weather-tooltip-detail">
                                    <span class="weather-tooltip-detail-icon">☀️</span>
                                    <span class="weather-tooltip-detail-value">UV ${weatherInfo.uv}</span>
                                </div>
                                <div class="weather-tooltip-detail">
                                    <span class="weather-tooltip-detail-icon">💨</span>
                                    <span class="weather-tooltip-detail-value">${weatherInfo.windSpeed}km/h</span>
                                </div>
                            </div>
                        ` : `
                            <div class="weather-tooltip-loading">等待天气数据加载...</div>
                        `}
                    </div>
                    ${day === todayDay ? '<span class="today-badge">今天</span>' : ''}
                `;

                // 点击日期切换状态
                cell.onclick = (e) => {
                    if (!e.target.classList.contains('edit-btn') && !e.target.closest('.weather-tooltip')) {
                        toggleDay(day);
                        // 同时更新天气显示
                        if (dailyWeatherData[day]) {
                            selectWeatherDay(day);
                        }
                    }
                };

                // 点击编辑按钮
                cell.querySelector('.edit-btn').onclick = (e) => {
                    e.stopPropagation();
                    openEditModal(day);
                };

                calendar.appendChild(cell);
            }
        }

        // 保存数据
        function saveData() {
            const data = {
                dayData: dayData,
                defaultOvertime: getDefaultOvertime(),
                defaultRest: getDefaultRest()
            };
            localStorage.setItem('calendar202604v2', JSON.stringify(data));
        }

        // 加载数据
        function loadData() {
            const saved = localStorage.getItem('calendar202604v2');
            if (saved) {
                const data = JSON.parse(saved);
                Object.assign(dayData, data.dayData || {});
                if (data.defaultOvertime) {
                    document.getElementById('defaultOvertime').value = data.defaultOvertime;
                }
                if (data.defaultRest) {
                    document.getElementById('defaultRest').value = data.defaultRest;
                }
            }
        }

        // 监听默认值变化
        document.getElementById('defaultOvertime').addEventListener('input', updateDisplay);
        document.getElementById('defaultRest').addEventListener('input', updateDisplay);

        // 点击弹窗外部关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ========== 天气功能 ==========

        // 天气图标映射
        const weatherIcons = {
            0: '☀️',  // Clear sky
            1: '🌤️',  // Mainly clear
            2: '⛅',  // Partly cloudy
            3: '☁️',  // Overcast
            45: '🌫️', // Foggy
            48: '🌫️', // Depositing rime fog
            51: '🌧️', // Light drizzle
            53: '🌧️', // Moderate drizzle
            55: '🌧️', // Dense drizzle

            63: '🌧️', // Moderate rain
            65: '🌧️', // Heavy rain
            71: '🌨️', // Slight snow
            73: '🌨️', // Moderate snow
            75: '❄️',  // Heavy snow
            80: '🌧️', // Slight rain showers
            81: '🌧️', // Moderate rain showers
            82: '🌧️', // Violent rain showers
            85: '🌨️', // Slight snow showers
            86: '❄️',  // Heavy snow showers
            95: '⛈️', // Thunderstorm
            96: '⛈️', // Thunderstorm with slight hail
            99: '⛈️', // Thunderstorm with heavy hail
            'default': '🌤️'
        };

        // 天气描述映射
        const weatherDescriptions = {
            0: '晴',
            1: '晴朗',
            2: '多云',
            3: '阴',
            45: '雾',
            48: '浓雾',
            51: '微雨',
            53: '小雨',
            55: '中雨',
            61: '小雨',
            63: '中雨',
            65: '大雨',
            71: '小雪',
            73: '中雪',
            75: '大雪',
            80: '阵雨',
            81: '中阵雨',
            82: '大阵雨',
            85: '阵雪',
            86: '大阵雪',
            95: '雷雨',
            96: '雷雨冰雹',
            99: '强雷雨冰雹'
        };

        // 常用城市坐标
        const cityCoordinates = {
            '合肥': { lat: 31.82, lon: 117.27 },
            '北京': { lat: 39.90, lon: 116.41 },
            '上海': { lat: 31.23, lon: 121.47 },
            '广州': { lat: 23.13, lon: 113.26 },
            '深圳': { lat: 22.54, lon: 114.06 },
            '杭州': { lat: 30.25, lon: 120.17 },
            '南京': { lat: 32.06, lon: 118.80 },
            '武汉': { lat: 30.58, lon: 114.30 },
            '成都': { lat: 30.67, lon: 104.07 },
            '西安': { lat: 34.26, lon: 108.94 },
            '重庆': { lat: 29.56, lon: 106.55 },
            '天津': { lat: 39.13, lon: 117.20 },
            '苏州': { lat: 31.30, lon: 120.62 },
            '郑州': { lat: 34.75, lon: 113.66 },
            '长沙': { lat: 28.23, lon: 112.94 },
            '青岛': { lat: 36.07, lon: 120.38 },
            '大连': { lat: 38.92, lon: 121.62 },
            '厦门': { lat: 24.48, lon: 118.09 },
            '沈阳': { lat: 41.80, lon: 123.43 },
            '济南': { lat: 36.65, lon: 116.98 },
            'hefei': { lat: 31.82, lon: 117.27 },
            'beijing': { lat: 39.90, lon: 116.41 },
            'shanghai': { lat: 31.23, lon: 121.47 }
        };

        // 保存城市
        function saveCity(city) {
            localStorage.setItem('weatherCity', city);
        }

        // 加载城市
        function loadCity() {
            const saved = localStorage.getItem('weatherCity');
            if (saved) {
                document.getElementById('cityInput').value = saved;
                return saved;
            }
            return '合肥';
        }

        // 获取天气图标
        function getWeatherIcon(code) {
            return weatherIcons[code] || weatherIcons['default'];
        }

        // 获取天气描述
        function getWeatherDesc(code) {
            return weatherDescriptions[code] || '未知';
        }

        // 当前选中的天气日期
        let selectedWeatherDay = null;

        // 获取天气
        async function fetchWeather() {
            let city = document.getElementById('cityInput').value.trim() || '合肥';
            saveCity(city);

            const contentEl = document.getElementById('weatherContent');
            const locationEl = document.getElementById('weatherLocation');
            contentEl.innerHTML = '<div class="weather-loading">正在加载天气数据...</div>';
            locationEl.textContent = city;

            // 获取城市坐标
            let coords = cityCoordinates[city] || cityCoordinates[city.toLowerCase()];

            // 如果没有预设坐标，尝试使用 geocoding API
            if (!coords) {
                try {
                    const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh&format=json`;
                    const geoResponse = await fetch(geoUrl);
                    if (geoResponse.ok) {
                        const geoData = await geoResponse.json();
                        if (geoData.results && geoData.results.length > 0) {
                            coords = {
                                lat: geoData.results[0].latitude,
                                lon: geoData.results[0].longitude
                            };
                            city = geoData.results[0].name;
                        }
                    }
                } catch (e) {
                    console.log('Geocoding failed:', e);
                }
            }

            // 如果还是没有坐标，使用合肥作为默认
            if (!coords) {
                coords = cityCoordinates['合肥'];
                city = '合肥';
                document.getElementById('cityInput').value = city;
            }

            try {
                const today = new Date();
                const formatDate = (d) => d.toISOString().split('T')[0];
                const startDate = new Date(today);
                startDate.setDate(startDate.getDate() - 20); // 过去20天

                let data = null;
                let usedApi = '';

                // 先尝试 Open-Meteo 历史 API 获取过去数据
                const archiveUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${coords.lat}&longitude=${coords.lon}&start_date=${formatDate(startDate)}&end_date=${formatDate(today)}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Asia/Shanghai`;

                console.log('Fetching weather data...');

                // 尝试获取历史数据
                let archiveData = null;
                try {
                    const archiveRes = await fetch(archiveUrl);
                    if (archiveRes.ok) {
                        archiveData = await archiveRes.json();
                        console.log('Open-Meteo archive success, days:', archiveData.daily.time.length);
                    }
                } catch (e) {
                    console.log('Archive API failed:', e.message);
                }

                // 获取 wttr.in 未来天气数据（尝试获取更多天数）
                let wttrData = null;
                let futureDays = [];

                // wttr.in 可以通过不同方式获取预报
                try {
                    // 尝试获取扩展预报
                    const wttrUrl = `https://wttr.in/${encodeURIComponent(city)}?format=j1`;
                    const wttrRes = await fetch(wttrUrl);
                    if (wttrRes.ok) {
                        wttrData = await wttrRes.json();
                        console.log('wttr.in success, forecast days:', wttrData.weather.length);
                    }
                } catch (e) {
                    console.log('wttr.in failed:', e.message);
                }

                // 尝试使用 Open-Meteo 预报 API（有时可用）
                let forecastData = null;
                try {
                    const forecastUrl = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,uv_index_max&timezone=Asia/Shanghai`;
                    const forecastRes = await fetch(forecastUrl, { signal: AbortSignal.timeout(8000) });
                    if (forecastRes.ok) {
                        forecastData = await forecastRes.json();
                        console.log('Open-Meteo forecast success, days:', forecastData.daily.time.length);
                    }
                } catch (e) {
                    console.log('Open-Meteo forecast failed:', e.message);
                }

                // 如果 Open-Meteo 失败，尝试使用 7Timer! API 获取更多预报
                let sevenTimerData = null;
                if (!forecastData) {
                    try {
                        // 7Timer! API - 免费的天气预报服务
                        const sevenTimerUrl = `https://www.7timer.info/bin/api.pl?lon=${coords.lon}&lat=${coords.lat}&product=civillight&output=json`;
                        const sevenTimerRes = await fetch(sevenTimerUrl);
                        if (sevenTimerRes.ok) {
                            sevenTimerData = await sevenTimerRes.json();
                            console.log('7Timer! success, days:', sevenTimerData.dataseries.length);
                        }
                    } catch (e) {
                        console.log('7Timer! failed:', e.message);
                    }
                }

                // 合并数据
                data = {
                    daily: {
                        time: [],
                        weather_code: [],
                        temperature_2m_max: [],
                        temperature_2m_min: [],
                        precipitation_sum: [],
                        uv_index_max: [],
                        relative_humidity_2m_mean: [],
                        wind_speed_10m_max: []
                    }
                };

                // 添加历史数据
                if (archiveData) {
                    for (let i = 0; i < archiveData.daily.time.length; i++) {
                        data.daily.time.push(archiveData.daily.time[i]);
                        data.daily.weather_code.push(archiveData.daily.weather_code[i]);
                        data.daily.temperature_2m_max.push(Math.round(archiveData.daily.temperature_2m_max[i]));
                        data.daily.temperature_2m_min.push(Math.round(archiveData.daily.temperature_2m_min[i]));
                        data.daily.precipitation_sum.push(archiveData.daily.precipitation_sum[i]);
                        data.daily.uv_index_max.push(5);
                        data.daily.relative_humidity_2m_mean.push(60);
                        data.daily.wind_speed_10m_max.push(15);
                    }
                    usedApi = 'Open-Meteo 历史';
                }

                // 添加未来数据（优先使用 Open-Meteo 预报，其次 7Timer!，最后 wttr.in）
                if (forecastData) {
                    // 使用 Open-Meteo 预报数据（通常16天）
                    for (let i = 0; i < forecastData.daily.time.length; i++) {
                        const dateStr = forecastData.daily.time[i];
                        if (archiveData && data.daily.time.includes(dateStr)) continue;

                        data.daily.time.push(dateStr);
                        data.daily.weather_code.push(forecastData.daily.weather_code[i]);
                        data.daily.temperature_2m_max.push(Math.round(forecastData.daily.temperature_2m_max[i]));
                        data.daily.temperature_2m_min.push(Math.round(forecastData.daily.temperature_2m_min[i]));
                        data.daily.precipitation_sum.push(forecastData.daily.precipitation_sum[i]);
                        data.daily.uv_index_max.push(Math.round(forecastData.daily.uv_index_max[i]));
                        data.daily.relative_humidity_2m_mean.push(60);
                        data.daily.wind_speed_10m_max.push(15);
                    }
                    usedApi += (usedApi ? ' + ' : '') + 'Open-Meteo 预报(16天)';
                } else if (sevenTimerData) {
                    // 使用 7Timer! 数据（通常7-8天）
                    for (let i = 0; i < sevenTimerData.dataseries.length; i++) {
                        const dayInfo = sevenTimerData.dataseries[i];
                        // 计算日期
                        const forecastDate = new Date(today);
                        forecastDate.setDate(forecastDate.getDate() + i);
                        const dateStr = forecastDate.toISOString().split('T')[0];

                        if (data.daily.time.includes(dateStr)) continue;

                        // 转换 7Timer! 天气代码
                        const weatherCode = convert7TimerCode(dayInfo.weather);

                        data.daily.time.push(dateStr);
                        data.daily.weather_code.push(weatherCode);
                        data.daily.temperature_2m_max.push(dayInfo.temp2m.max);
                        data.daily.temperature_2m_min.push(dayInfo.temp2m.min);
                        data.daily.precipitation_sum.push(dayInfo.precipitation ? dayInfo.precipitation : 0);
                        data.daily.uv_index_max.push(5);
                        data.daily.relative_humidity_2m_mean.push(60);
                        data.daily.wind_speed_10m_max.push(15);
                    }
                    usedApi += (usedApi ? ' + ' : '') + '7Timer! 预报(7天)';
                } else if (wttrData) {
                    // 使用 wttr.in 数据（通常3天）
                    const dailyWttr = wttrData.weather;
                    for (let i = 0; i < dailyWttr.length; i++) {
                        const dayInfo = dailyWttr[i];
                        const dateStr = dayInfo.date;
                        if (archiveData && data.daily.time.includes(dateStr)) continue;

                        data.daily.time.push(dateStr);
                        if (dayInfo.hourly && dayInfo.hourly.length > 0) {
                            const hourData = dayInfo.hourly[4] || dayInfo.hourly[0];
                            data.daily.weather_code.push(convertWttrCode(hourData.weatherCode));
                            data.daily.temperature_2m_max.push(Math.round(parseFloat(dayInfo.maxtempC)));
                            data.daily.temperature_2m_min.push(Math.round(parseFloat(dayInfo.mintempC)));
                            data.daily.precipitation_sum.push(parseFloat(hourData.precipMM || 0));
                            data.daily.uv_index_max.push(parseFloat(dayInfo.uvIndex || 5));
                            data.daily.relative_humidity_2m_mean.push(parseFloat(hourData.humidity || 60));
                            data.daily.wind_speed_10m_max.push(Math.round(parseFloat(hourData.windspeedKmph || 15)));
                        }
                    }
                    usedApi += (usedApi ? ' + ' : '') + 'wttr.in 预报(3天)';
                }

                if (data.daily.time.length === 0) {
                    throw new Error('所有天气API都不可用，请稍后再试');
                }

                console.log('Total weather days:', data.daily.time.length);
                const daily = data.daily;

                // 存储每日天气数据
                dailyWeatherData = {};
                const todayStr = today.toISOString().split('T')[0];
                let todayIndex = -1;

                // 先找到今天的索引
                for (let i = 0; i < daily.time.length; i++) {
                    if (daily.time[i] === todayStr) {
                        todayIndex = i;
                        break;
                    }
                }

                // 再存储天气数据
                for (let i = 0; i < daily.time.length; i++) {
                    const dateStr = daily.time[i];
                    const date = new Date(dateStr);
                    const dayNum = date.getDate();

                    // 判断是否过去：日期字符串小于今天
                    const isPast = dateStr < todayStr;
                    const isToday = dateStr === todayStr;

                    dailyWeatherData[dayNum] = {
                        icon: getWeatherIcon(daily.weather_code[i]),
                        maxTemp: Math.round(daily.temperature_2m_max[i]),
                        minTemp: Math.round(daily.temperature_2m_min[i]),
                        desc: getWeatherDesc(daily.weather_code[i]),
                        precip: daily.precipitation_sum[i].toFixed(1),
                        uv: Math.round(daily.uv_index_max[i]),
                        humidity: Math.round(daily.relative_humidity_2m_mean[i]),
                        windSpeed: Math.round(daily.wind_speed_10m_max[i]),
                        dateStr: dateStr,
                        isPast: isPast,
                        isToday: isToday
                    };
                }

                // 重新生成日历以显示天气
                generateCalendar();

                // 生成滑动时间轴HTML
                const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

                let timelineHtml = `
                    <div class="weather-timeline-container">
                        <div class="weather-timeline-title">
                            <span>📅 滑动查看天气</span>
                            <small style="color:#999;margin-left:10px;">${usedApi} · 过去20天 + 未来16天</small>
                        </div>
                        <div class="weather-timeline-scroll" id="weatherTimeline">
                `;

                for (let i = 0; i < daily.time.length; i++) {
                    const date = new Date(daily.time[i]);
                    const dayOfWeek = weekdays[date.getDay()];
                    const dayNum = date.getDate();
                    const monthNum = date.getMonth() + 1;
                    const dateStr = daily.time[i];
                    const isToday = dateStr === todayStr;
                    const isPast = dateStr < todayStr;
                    const wData = dailyWeatherData[dayNum];

                    timelineHtml += `
                        <div class="timeline-day ${isToday ? 'today' : ''} ${isPast ? 'past' : ''}" data-day="${dayNum}" onclick="selectWeatherDay(${dayNum})">
                            <div class="timeline-date">${monthNum}/${dayNum} ${dayOfWeek}</div>
                            <div class="timeline-icon">${wData.icon}</div>
                            <div class="timeline-temp">
                                <span class="timeline-temp-high">${wData.maxTemp}°</span>
                                <span class="timeline-temp-low">${wData.minTemp}°</span>
                            </div>
                        </div>
                    `;
                }

                timelineHtml += '</div></div>';

                // 默认选中今天的详细天气
                selectedWeatherDay = todayDay;

                contentEl.innerHTML = timelineHtml + `
                    <div class="selected-day-weather" id="selectedDayWeather">
                        ${renderSelectedDayWeather(todayDay)}
                    </div>
                `;

                locationEl.textContent = `${city}`;

                // 滚动到今天的位置
                setTimeout(() => {
                    const todayEl = document.querySelector('.timeline-day.today');
                    if (todayEl) {
                        todayEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                        todayEl.classList.add('active');
                    }
                }, 100);

            } catch (error) {
                console.error('天气获取失败:', error);
                contentEl.innerHTML = `
                    <div class="weather-error">
                        ⚠️ 无法获取天气数据
                        <br><br>
                        <small style="color:#666">错误: ${error.message}</small>
                        <br><br>
                        <small style="color:#888">提示：本地打开的HTML文件可能受到浏览器安全限制。</small>
                        <br>
                        <small style="color:#888">建议将文件部署到Web服务器或使用VS Code Live Server插件打开。</small>
                        <br><br>
                        <button onclick="fetchWeather()" style="padding:8px 16px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;">重新尝试</button>
                    </div>
                `;
                locationEl.textContent = '获取失败';
            }
        }

        // 选择天气日期
        function selectWeatherDay(day) {
            selectedWeatherDay = day;

            // 更新时间轴选中状态
            document.querySelectorAll('.timeline-day').forEach(el => {
                el.classList.remove('active');
                if (parseInt(el.dataset.day) === day) {
                    el.classList.add('active');
                    // 滚动到选中项
                    el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }
            });

            // 更新详细天气显示
            const detailEl = document.getElementById('selectedDayWeather');
            if (detailEl) {
                detailEl.innerHTML = renderSelectedDayWeather(day);
            }
        }

        // 渲染选中日期的详细天气
        function renderSelectedDayWeather(day) {
            const wData = dailyWeatherData[day];
            if (!wData) {
                return '<div style="text-align:center;color:#888;padding:20px;">暂无该日期天气数据</div>';
            }

            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const date = new Date(wData.dateStr);
            const dayOfWeek = weekdays[date.getDay()];

            let label = '';
            if (wData.isToday) {
                label = '<span style="color:#ec4899;font-weight:bold;">今天</span>';
            } else if (wData.isPast) {
                label = '<span style="color:#888;">过去</span>';
            } else {
                label = '<span style="color:#10b981;">未来</span>';
            }

            return `
                <div class="selected-day-header">
                    <span class="selected-day-title">${date.getMonth() + 1}月${day}日 ${dayOfWeek} ${label}</span>
                </div>
                <div class="selected-day-content">
                    <div class="selected-day-main">
                        <span class="selected-day-icon">${wData.icon}</span>
                        <span class="selected-day-temp">${wData.maxTemp}°</span>
                        <span class="selected-day-desc">${wData.desc}</span>
                    </div>
                    <div class="selected-day-details">
                        <div class="selected-day-detail">
                            <span class="selected-day-detail-icon">🌡️</span>
                            <span class="selected-day-detail-value">${wData.minTemp}° ~ ${wData.maxTemp}°</span>
                        </div>
                        <div class="selected-day-detail">
                            <span class="selected-day-detail-icon">💧</span>
                            <span class="selected-day-detail-value">${wData.humidity}%</span>
                        </div>
                        <div class="selected-day-detail">
                            <span class="selected-day-detail-icon">🌧️</span>
                            <span class="selected-day-detail-value">${wData.precip}mm</span>
                        </div>
                        <div class="selected-day-detail">
                            <span class="selected-day-detail-icon">☀️</span>
                            <span class="selected-day-detail-value">UV ${wData.uv}</span>
                        </div>
                        <div class="selected-day-detail">
                            <span class="selected-day-detail-icon">💨</span>
                            <span class="selected-day-detail-value">${wData.windSpeed}km/h</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 获取风向
        function getWindDirection(deg) {
            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            const index = Math.round(deg / 45) % 8;
            return directions[index];
        }

        // 转换 wttr.in 天气代码到 Open-Meteo 代码
        function convertWttrCode(code) {
            const codeNum = parseInt(code);
            // wttr.in code 映射到 Open-Meteo weather_code
            if (codeNum === 113) return 0;  // Sunny
            if (codeNum === 116) return 2;  // Partly cloudy
            if (codeNum === 119) return 3;  // Cloudy
            if (codeNum === 122) return 3;  // Overcast
            if (codeNum === 143) return 45; // Mist
            if (codeNum === 176) return 51; // Light rain
            if (codeNum === 179) return 71; // Light snow
            if (codeNum === 182) return 61; // Sleet
            if (codeNum === 185) return 61; // Freezing drizzle
            if (codeNum === 200) return 95; // Thunder
            if (codeNum === 227) return 71; // Blowing snow
            if (codeNum === 230) return 75; // Blizzard
            if (codeNum === 248) return 45; // Fog
            if (codeNum === 260) return 45; // Freezing fog
            if (codeNum === 263) return 51; // Light drizzle
            if (codeNum === 266) return 53; // Drizzle
            if (codeNum === 281) return 51; // Freezing drizzle
            if (codeNum === 284) return 51; // Freezing drizzle
            if (codeNum === 293) return 51; // Light rain
            if (codeNum === 296) return 53; // Light rain
            if (codeNum === 299) return 61; // Moderate rain
            if (codeNum === 302) return 63; // Moderate rain
            if (codeNum === 305) return 63; // Heavy rain
            if (codeNum === 308) return 65; // Heavy rain
            if (codeNum === 311) return 61; // Freezing rain
            if (codeNum === 314) return 61; // Freezing rain
            if (codeNum === 317) return 61; // Sleet
            if (codeNum === 320) return 71; // Snow
            if (codeNum === 323) return 71; // Light snow
            if (codeNum === 326) return 71; // Light snow
            if (codeNum === 329) return 73; // Moderate snow
            if (codeNum === 332) return 73; // Moderate snow
            if (codeNum === 335) return 75; // Heavy snow
            if (codeNum === 338) return 75; // Heavy snow
            if (codeNum === 350) return 51; // Ice pellets
            if (codeNum === 353) return 61; // Light rain shower
            if (codeNum === 356) return 63; // Moderate rain shower
            if (codeNum === 359) return 65; // Heavy rain shower
            if (codeNum === 362) return 71; // Light sleet
            if (codeNum === 365) return 71; // Moderate sleet
            if (codeNum === 368) return 71; // Light snow shower
            if (codeNum === 371) return 73; // Moderate snow shower
            if (codeNum === 374) return 71; // Ice pellets
            if (codeNum === 377) return 71; // Heavy ice pellets
            if (codeNum === 386) return 95; // Light thunderstorm
            if (codeNum === 389) return 95; // Thunderstorm
            if (codeNum === 392) return 96; // Thunderstorm with snow
            if (codeNum === 395) return 96; // Heavy thunderstorm with snow
            return 2; // 默认多云
        }

        // 转换 7Timer! 天气代码到 Open-Meteo 代码
        function convert7TimerCode(code) {
            // 7Timer! weather codes: clearday, pcloudyday, mcloudyday, cloudday, rainday, snowday, etc.
            const codeStr = String(code).toLowerCase();
            if (codeStr.includes('clear')) return 0;  // 晴
            if (codeStr.includes('pcloudy')) return 1; // 少云
            if (codeStr.includes('mcloudy')) return 2; // 多云
            if (codeStr.includes('cloud')) return 3;  // 阴
            if (codeStr.includes('rain')) return 61;  // 雨
            if (codeStr.includes('snow')) return 71;  // 雪
            if (codeStr.includes('ts') || codeStr.includes('thunder')) return 95; // 雷雨
            if (codeStr.includes('fog') || codeStr.includes('mist')) return 45; // 雾
            return 2; // 默认多云
        }

        // 初始化
        loadData();
        loadCity();
        generateCalendar();
        updateDisplay();
        fetchWeather();
    </script>
</body>
